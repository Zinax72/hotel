<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="../../assets/styles/settings.css">
</head>
<body>
    <div class="sidebar">
        <h2 id="userName"></h2>
        <a href="settings.html" class="menu-item">Settings</a>
        <a href="bookings.html" class="menu-item">Bookings History</a>
        <div class="sidebar-bottom">
            <a href="home.html" id="return" class="menu-item return">RETURN</a>
        </div>
    </div>

    <div class="main">
        <div class="table-header">
            <h2>Account Settings</h2>
        </div>

        <div class="settings-card">
            <!-- Change Email -->
            <div class="settings-section">
                <h3>Change Email</h3>
                <div class="settings-group">
                    <label>Current Email</label>
                    <input type="email" id="currentEmail" placeholder="Current email" readonly>
                </div>
                <div class="settings-group">
                    <label>New Email</label>
                    <input type="email" id="newEmail" placeholder="Enter new email">
                </div>
                <div class="settings-group">
                    <label>Confirm Password</label>
                    <input type="password" id="emailPassword" placeholder="Enter your password">
                </div>
                <button class="settings-btn" id="updateEmailBtn">Update Email</button>
                <p class="settings-msg" id="emailMsg"></p>
            </div>

            <div class="settings-divider"></div>

            <!-- Change Password -->
            <div class="settings-section">
                <h3>Change Password</h3>
                <div class="settings-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password">
                </div>
                <div class="settings-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                </div>
                <div class="settings-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                </div>
                <button class="settings-btn" id="updatePasswordBtn">Update Password</button>
                <p class="settings-msg" id="passwordMsg"></p>
            </div>
        </div>
    </div>

    <script src="../../assets/scripts/jq.js"></script>
    <script src="../../assets/scripts/settings.js"></script>
</body>
</html>
