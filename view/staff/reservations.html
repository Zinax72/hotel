<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations</title>
    <link rel="stylesheet" href="../../assets/styles/staff.css">
</head>
<body>
    <div class="sidebar">
        <h2>Hotel Management</h2>
        
        <a href="dashboard.html" class="managerOnly">Dashboard</a>
        <a href="reservations.html" class="menu-item">Reservations</a>
        <a href="rooms.html" class="menu-item">Rooms</a>
        <a href="promotions.html" class="managerOnly">Promotions</a>
        <a href="payments.html" class="managerOnly">Payment Records</a>
        <a href="user.html" class="adminOnly">Manage Users</a>
        
        <div class="sidebar-bottom">
            <a href="#" id="logoutBtn" class="menu-item logout">LOGOUT</a>
        </div>
    </div>

    <div class="main">
        <div class="table-header">
            <h2 id="tableName"></h2>
            <div class="table-buttons">
                <button id="switchBtn"></button>
                <button id="addBtn">ADD</button>
            </div>
        </div>
        <table id="reservationsTable">
            <thead>
                <tr>
                    <th>Res ID</th>
                    <th>Guest</th>
                    <th>Room</th>
                    <th>Type</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Guests</th>
                    <th>Pet</th>
                    <th>Discount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="reservations"></tbody>
        </table>
        <div id="emptyTable"></div>
    </div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>EDIT RESERVATION</h3>
        
        <input type="hidden" id="editResID">
        
        <div class="edit-grid">
            <div class="edit-field">
                <label>CHECK IN</label>
                <input type="date" id="editCheckIN">
            </div>
            <div class="edit-field">
                <label>CHECK OUT</label>
                <input type="date" id="editCheckOUT">
            </div>
            <div class="edit-field">
                <label>ROOM</label>
                <select id="editRoomID"></select>
            </div>
            <div class="edit-field">
                <label>GUESTS</label>
                <input type="number" id="editGuestsNum" min="1">
            </div>
            <div class="edit-field">
                <label>PET</label>
                <select id="editHasPet">
                    <option value="0">NO</option>
                    <option value="1">YES</option>
                </select>
            </div>
            <div class="edit-field">
                <label>DISCOUNT</label>
                <select id="editDiscountID">
                    <option value="">NONE</option>
                    <option value="1">PWD</option>
                    <option value="2">SENIOR CITIZEN</option>
                </select>
            </div>
            <div class="edit-field full-width">
                <label>STATUS</label>
                <select id="editStatus">
                    <option value="PENDING">PENDING</option>
                    <option value="CONFIRMED">CONFIRMED</option>
                    <option value="CANCELLED">CANCELLED</option>
                    <option value="COMPLETED">COMPLETED</option>
                </select>
            </div>
        </div>
        
        <button id="saveEditBtn">SAVE CHANGES</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>ADD RESERVATION</h3>

        <div class="add-grid">
            <div class="add-field">
                <label>USER</label>
                <select id="addResUserID"></select>
            </div>
            <div class="add-field">
                <label>ROOM</label>
                <select id="addResRoomID"></select>
            </div>
            <div class="add-field">
                <label>CHECK IN</label>
                <input type="date" id="addResCheckIN">
            </div>
            <div class="add-field">
                <label>CHECK OUT</label>
                <input type="date" id="addResCheckOUT">
            </div>
            <div class="add-field">
                <label>ADULTS</label>
                <input type="number" id="addResAdults" min="1" value="1">
            </div>
            <div class="add-field">
                <label>CHILDREN</label>
                <input type="number" id="addResChildren" min="0" value="0">
            </div>
            <div class="edit-field">
                <label>PET</label>
                <select id="editHasPet">
                    <option value="0">NO</option>
                    <option value="1">YES</option>
                </select>
            </div>
            <div class="add-field">
                <label>DISCOUNT</label>
                <select id="addResDiscount">
                    <option value="">NONE</option>
                    <option value="1">PWD</option>
                    <option value="2">SENIOR CITIZEN</option>
                </select>
            </div>
        </div>

        <button id="saveAddBtn">SAVE</button>
    </div>
</div>
    <script src="../../assets/scripts/jq.js"></script>
    <script src="../../assets/scripts/reservations.js"></script>
</body>
</html>
