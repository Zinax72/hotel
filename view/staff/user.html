<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link rel="stylesheet" href="../../assets/styles/staff.css">
</head>
<body>
    <div class="sidebar">
        <h2>Hotel Management</h2>
        
        <a href="dashboard.html" class="menu-item">Dashboard</a>
        <a href="rooms.html" class="managerOnly">Rooms</a>
        <a href="reservations.html" class="managerOnly">Reservations</a>
        <a href="promotions.html" class="managerOnly">Promotions</a>
        <a href="reports.html" class="managerOnly">Reports</a>
        <a href="user.html" class="adminOnly">Manage Users</a>
        
        <div class="sidebar-bottom">
            <a href="#" id="logoutBtn" class="menu-item logout">LOGOUT</a>
        </div>
    </div>

    <div class="main">
        <div class="table-header">
            <h2 id="tableName">USERS</h2>
            <button id="addBtn">ADD</button>
        </div>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Contact</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users"></tbody>
        </table>
        <div id="emptyTable"></div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>ADD USER DETAILS</h3>
            
            <input type="hidden" id="addUserID">
            
            <div class="add-grid">
                <div class="add-field">
                    <label>FIRST NAME</label>
                    <input type="text" id="addFirstName">
                </div>
                <div class="add-field">
                    <label>LAST NAME</label>
                    <input type="text" id="addLastName">
                </div>
                <div class="add-field">
                    <label>EMAIL</label>
                    <input type="email" id="addEmail">
                </div>
                <div class="add-field">
                    <label>CONTACT</label>
                    <input type="tel" id="addContactNo">
                </div>
                <div class="add-roleField">
                    <label>ROLE</label>
                    <select id="addRole">
                        <option value="GUEST">GUEST</option>
                        <option value="RECEPTIONIST">RECEPTIONIST</option>
                        <option value="MANAGER">MANAGER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
            </div>
            
            <button id="saveAddBtn">SAVE CHANGES</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>EDIT USER DETAILS</h3>
            
            <input type="hidden" id="editUserID">
            
            <div class="edit-grid">
                <div class="edit-field">
                    <label>FIRST NAME</label>
                    <input type="text" id="editFirstName">
                </div>
                <div class="edit-field">
                    <label>LAST NAME</label>
                    <input type="text" id="editLastName">
                </div>
                <div class="edit-field">
                    <label>EMAIL</label>
                    <input type="email" id="editEmail">
                </div>
                <div class="edit-field">
                    <label>CONTACT</label>
                    <input type="tel" id="editContactNo">
                </div>
                <div class="edit-roleField">
                    <label>ROLE</label>
                    <select id="editRole">
                        <option value="GUEST">GUEST</option>
                        <option value="RECEPTIONIST">RECEPTIONIST</option>
                        <option value="MANAGER">MANAGER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
            </div>
            
            <button id="saveEditBtn">SAVE CHANGES</button>
        </div>
    </div>

    <div id="resetModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>UPDATE PASSWORD</h3>

            <input type="hidden" id="passUserID">

            <div class="edit-passGrid">
                <div class="edit-passField">
                    <input type="password" id="newPassword">
                </div>
            </div>
            <button id="saveResetBtn">SAVE CHANGES</button>
        </div>
    </div>

    <script src="../../assets/scripts/jq.js"></script>
    <script src="../../assets/scripts/users.js"></script>
</body>
</html>
